<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enemy Within Character Sheets</title>
  <style>
    :root {
      --ink: #2a1709;
      --brown: #5f3214;
      --gold: #b88435;
      --dark: #120b07;
      --parchment: #e7cf9f;
      --parchment-light: #f4e3b8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 226, 159, 0.25), transparent 30%),
        linear-gradient(135deg, #1a0f09, #3a2416 45%, #110906);
      padding: 28px;
    }

    .parchment {
      max-width: 1180px;
      margin: 0 auto;
      padding: clamp(24px, 4vw, 48px);
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.35), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(90,43,13,0.15), transparent 22%),
        radial-gradient(circle at 30% 80%, rgba(90,43,13,0.12), transparent 24%),
        linear-gradient(180deg, var(--parchment-light), var(--parchment));
      border: 7px double #6d421f;
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55), inset 0 0 60px rgba(92,47,20,0.25);
      position: relative;
      overflow: hidden;
    }

    .parchment::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg, rgba(75,42,17,0.035) 0 1px, transparent 1px 8px),
        repeating-linear-gradient(90deg, rgba(75,42,17,0.025) 0 1px, transparent 1px 10px);
      mix-blend-mode: multiply;
    }

    header, .grid, footer { position: relative; z-index: 1; }

    header {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      color: #3b1e0b;
      text-shadow: 0 2px 0 rgba(255,255,255,0.28);
      letter-spacing: 0.035em;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 700px;
      font-size: 1.15rem;
      line-height: 1.45;
      color: #593319;
    }

    .divider {
      width: min(620px, 85%);
      height: 2px;
      margin: 22px auto 0;
      background: linear-gradient(90deg, transparent, #6a3b19, transparent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 22px;
    }

    .character-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: rgba(72, 36, 13, 0.12);
      border: 2px solid rgba(80, 43, 18, 0.55);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 9px 22px rgba(66, 32, 10, 0.28);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .character-card:hover,
    .character-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px rgba(66, 32, 10, 0.38);
      border-color: var(--gold);
      outline: none;
    }

    .portrait-wrap {
      aspect-ratio: 1 / 1;
      background: #2a1709;
      overflow: hidden;
      border-bottom: 2px solid rgba(80, 43, 18, 0.55);
    }

    .portrait-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .character-card:hover img,
    .character-card:focus-visible img {
      transform: scale(1.045);
    }

    .label {
      padding: 14px 12px 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(80, 43, 18, 0.08));
    }

    .label h2 {
      margin: 0;
      font-size: 1.45rem;
      color: #331805;
    }

    .label span {
      display: inline-block;
      margin-top: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #744115;
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: #5c3518;
      font-size: 0.95rem;
    }

    @media (max-width: 540px) {
      body { padding: 14px; }
      .parchment { padding: 20px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="parchment">
    <header>
      <h1>The Enemy Within</h1>
      <p class="subtitle">Select a player portrait to open that character sheet.</p>
      <div class="divider"></div>
    </header>

    <section class="grid" aria-label="Player character sheets">
      <a class="character-card" href="dave.html">
        <div class="portrait-wrap"><img src="Token1.png" alt="Dave character portrait"></div>
        <div class="label"><h2>Dave</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="eric.html">
        <div class="portrait-wrap"><img src="Token2.png" alt="Eric character portrait"></div>
        <div class="label"><h2>Eric</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="jimmie.html">
        <div class="portrait-wrap"><img src="Token3.png" alt="Jimmie character portrait"></div>
        <div class="label"><h2>Jimmie</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="roberto.html">
        <div class="portrait-wrap"><img src="Token4.png" alt="Roberto character portrait"></div>
        <div class="label"><h2>Roberto</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="scott.html">
        <div class="portrait-wrap"><img src="Token5.png" alt="Scott character portrait"></div>
        <div class="label"><h2>Scott</h2><span>Open Sheet</span></div>
      </a>
     
    </section>

    <footer><a href="wiki.html">Campaign Wiki</a></footer>
  </main>
</body>
</html>
