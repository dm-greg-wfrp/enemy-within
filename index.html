<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enemy Within Character Sheets</title>
  <style>
    :root {
      --bg: #0f131a;
      --panel: #11151c;
      --card: #1a1f2a;
      --card-hover: #202635;
      --line: #313b4d;
      --line-bright: #4aa7d8;
      --text: #e8edf7;
      --muted: #9ca7b7;
      --accent: #78d8ff;
      --button: #1f2937;
      --button-hover: #2a3647;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(74,167,216,0.16), transparent 32%),
        linear-gradient(135deg, #0f131a, #11151c 45%, #05070a);
      padding: 28px;
    }

    .parchment {
      max-width: 1180px;
      margin: 0 auto;
      padding: clamp(24px, 4vw, 48px);
      background: var(--panel);
      border: 1px solid #263241;
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55);
      position: relative;
      overflow: hidden;
    }

    .parchment::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(120,216,255,0.08), transparent 24%),
        radial-gradient(circle at 80% 20%, rgba(74,167,216,0.08), transparent 24%);
    }

    header, .grid, footer { position: relative; z-index: 1; }

    header {
      text-align: center;
      margin-bottom: 34px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      color: #ffffff;
      letter-spacing: 0.035em;
    }

    .subtitle {
      margin: 12px auto 0;
      max-width: 700px;
      font-size: 1.15rem;
      line-height: 1.45;
      color: var(--muted);
    }

    .divider {
      width: min(620px, 85%);
      height: 1px;
      margin: 22px auto 0;
      background: linear-gradient(90deg, transparent, var(--line-bright), transparent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 22px;
    }

    .character-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 9px 22px rgba(0,0,0,0.28);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .character-card:hover,
    .character-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 0 16px 34px rgba(0,0,0,0.38);
      border-color: var(--line-bright);
      background: var(--card-hover);
      outline: none;
    }

    .portrait-wrap {
      aspect-ratio: 1 / 1;
      background: #05070a;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }

    .portrait-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.25s ease;
    }

    .character-card:hover img,
    .character-card:focus-visible img {
      transform: scale(1.045);
    }

    .label {
      padding: 14px 12px 16px;
      text-align: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.08));
    }

    .label h2 {
      margin: 0;
      font-size: 1.45rem;
      color: #ffffff;
    }

    .label span {
      display: inline-block;
      margin-top: 6px;
      font-family: Arial, sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
    }

    .wiki-link-large {
      display: block;
      text-align: center;
      margin: 30px auto 0;
      font-size: 2rem;
      font-weight: bold;
      color: #f8fafc;
      text-decoration: none;
      background: var(--button);
      border: 1px solid #3f4b61;
      border-radius: 14px;
      padding: 18px 28px;
      width: fit-content;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      transition: all 0.2s ease;
    }

    .wiki-link-large:hover {
      background: var(--button-hover);
      border-color: var(--line-bright);
      transform: scale(1.03);
    }

    footer {
      margin-top: 34px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 540px) {
      body { padding: 14px; }
      .parchment { padding: 20px; }
      .grid { grid-template-columns: 1fr; }
      .wiki-link-large {
        width: 100%;
        font-size: 1.45rem;
      }
    }
  </style>
</head>
<body>
  <main class="parchment">
    <header>
      <h1>The Enemy Within</h1>
      <p class="subtitle">Select a player portrait to open that character sheet.</p>
      <div class="divider"></div>
    </header>

    <section class="grid" aria-label="Player character sheets">
      <a class="character-card" href="dave.html">
        <div class="portrait-wrap"><img src="Wilt.png" alt="Dave character portrait"></div>
        <div class="label"><h2>Wilt Philadelphia</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="eric.html">
        <div class="portrait-wrap"><img src="Token2.png" alt="Eric character portrait"></div>
        <div class="label"><h2>Eric</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="jimmie.html">
        <div class="portrait-wrap"><img src="Token3.png" alt="Jimmie character portrait"></div>
        <div class="label"><h2>Jimmie</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="roberto.html">
        <div class="portrait-wrap"><img src="Token4.png" alt="Roberto character portrait"></div>
        <div class="label"><h2>Roberto</h2><span>Open Sheet</span></div>
      </a>

      <a class="character-card" href="scott.html">
        <div class="portrait-wrap"><img src="Token5.png" alt="Scott character portrait"></div>
        <div class="label"><h2>Scott</h2><span>Open Sheet</span></div>
      </a>
     
    </section>

    <footer>
      <a class="wiki-link-large" href="wiki.html">
    Campaign Wiki
</a>
    </footer>
  </main>
</body>
</html>
