<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Campaign Wiki</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#e2d3b0;
    margin:0;
    padding:20px;
}
.container{
    max-width:1200px;
    margin:auto;
}
h1{
    text-align:center;
}
.form-section, .entries-section{
    background:#f4ead2;
    border:2px solid #8b6f47;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
}
input, select, textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
}
textarea{
    min-height:150px;
}
button{
    padding:10px 16px;
    cursor:pointer;
}
.entry{
    border:1px solid #8b6f47;
    padding:10px;
    margin-bottom:10px;
    background:white;
}
.small{
    color:#666;
    font-size:0.9em;
}
</style>
</head>
<body>
<div class="container">
<h1>Campaign Wiki</h1>

<div class="form-section">
<h2>Create / Edit Entry</h2>

<label>Category</label>
<select id="category">
<option>NPCs</option>
<option>Locations</option>
<option>Handouts</option>
<option>Session Notes</option>
</select>

<label>Title</label>
<input type="text" id="title">

<label>Location</label>
<input type="text" id="location" placeholder="Example: Bögenhafen, The Crossed Pikes, Crizean Mire">

<label>Notes</label>
<textarea id="content"></textarea>

<button onclick="saveEntry()">Save Entry</button>
<span id="status"></span>
</div>

<div class="entries-section">
<h2>Entries</h2>
<div id="entries"></div>
</div>

</div>

<script>
const entriesDiv = document.getElementById("entries");

function saveEntry() {
    const entry = {
        category: document.getElementById("category").value,
        title: document.getElementById("title").value,
        location: document.getElementById("location").value,
        content: document.getElementById("content").value,
        updated: new Date().toLocaleString()
    };

    let entries = JSON.parse(localStorage.getItem("wikiEntries") || "[]");
    entries.push(entry);
    localStorage.setItem("wikiEntries", JSON.stringify(entries));

    document.getElementById("status").innerText = "Saved ✓";

    renderEntries();
}

function renderEntries() {
    entriesDiv.innerHTML = "";
    let entries = JSON.parse(localStorage.getItem("wikiEntries") || "[]");

    entries.reverse().forEach(entry => {
        const div = document.createElement("div");
        div.className = "entry";

        div.innerHTML = `
            <h3>${entry.title}</h3>
            <div><strong>Category:</strong> ${entry.category}</div>
            <div><strong>Location:</strong> ${entry.location || "—"}</div>
            <p>${entry.content}</p>
            <div class="small">Last Edited: ${entry.updated}</div>
        `;

        entriesDiv.appendChild(div);
    });
}

renderEntries();
</script>

</body>
</html>
