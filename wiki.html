<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Wiki</title>

<style>
body{
    margin:0;
    font-family:Georgia, serif;
    background:#d8c7a0;
    color:#222;
}

.topbar{
    background:#4b3621;
    color:white;
    padding:12px 20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.topbar a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.layout{
    display:flex;
    height:calc(100vh - 52px);
}

.sidebar{
    width:320px;
    background:#efe2bf;
    border-right:3px solid #6b4f2a;
    overflow-y:auto;
    padding:15px;
    box-sizing:border-box;
}

.content{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.form-box{
    background:#f8f0d8;
    border:3px solid #6b4f2a;
    padding:20px;
    border-radius:10px;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    box-sizing:border-box;
    border:1px solid #888;
    border-radius:5px;
    font-size:14px;
}

textarea{
    min-height:220px;
    resize:vertical;
}

button{
    padding:10px 16px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#6b4f2a;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#5a4121;
}

.section{
    margin-bottom:15px;
}

.section h3{
    margin:0;
    padding:10px;
    background:#6b4f2a;
    color:white;
    cursor:pointer;
    border-radius:5px 5px 0 0;
}

.section-content{
    background:#f8f0d8;
    border:1px solid #6b4f2a;
    border-top:none;
    padding:8px;
}

.entry-link{
    padding:8px;
    border-bottom:1px solid #ccc;
    cursor:pointer;
}

.entry-link:hover{
    background:#ddd3b5;
}

.entry-title{
    font-weight:bold;
}

.small{
    font-size:12px;
    color:#666;
}

.filter-bar button{
    margin-right:5px;
    margin-bottom:5px;
}

.tag-suggestions span{
    display:inline-block;
    background:#ddd;
    padding:6px 10px;
    border-radius:5px;
    margin:3px;
    cursor:pointer;
}

.tag-suggestions span:hover{
    background:#bbb;
}

.preview{
    max-width:300px;
    max-height:300px;
    display:block;
    margin-top:10px;
    border:2px solid #6b4f2a;
}

#status{
    margin-left:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
    <a href="index.html">← Return Home</a>
    <div><strong>Campaign Wiki</strong></div>
</div>

<div class="layout">

<div class="sidebar">

    <input type="text" id="search" placeholder="Search..." onkeyup="renderEntries()">

    <div class="filter-bar">
        <button onclick="setFilter('All')">All</button>
        <button onclick="setFilter('NPCs')">NPCs</button>
        <button onclick="setFilter('Locations')">Locations</button>
        <button onclick="setFilter('Handouts')">Handouts</button>
        <button onclick="setFilter('Session Notes')">Session Notes</button>
    </div>

    <div id="sidebarEntries"></div>

</div>

<div class="content">

<div class="form-box">

<h2>Create / Edit Entry</h2>

<input type="hidden" id="editingId">

<label>Category</label>
<select id="category">
    <option>NPCs</option>
    <option>Locations</option>
    <option>Handouts</option>
    <option>Session Notes</option>
</select>

<label>Title</label>
<input type="text" id="title">

<label>Location</label>
<input type="text" id="location">

<label>Tags</label>
<input type="text" id="tags" placeholder="Comma separated tags">

<div class="tag-suggestions">
Suggested Tags:
<br>
<span onclick="addTag('Altdorf')">Altdorf</span>
<span onclick="addTag('the Emperor')">the Emperor</span>
<span onclick="addTag('monster')">monster</span>
<span onclick="addTag('NPC')">NPC</span>
</div>

<br>

<label>Image Upload</label>
<input type="file" id="imageUpload" accept="image/*">

<img id="preview" class="preview" style="display:none;">

<label>Notes</label>
<textarea id="content"></textarea>

<button onclick="saveEntry()">Save Entry</button>
<span id="status"></span>

</div>

</div>

</div>

<script>
let currentFilter = "All";

function getEntries(){
    return JSON.parse(localStorage.getItem("wikiEntries") || "[]");
}

function saveEntries(entries){
    localStorage.setItem("wikiEntries", JSON.stringify(entries));
}

function setFilter(filter){
    currentFilter = filter;
    renderEntries();
}

function addTag(tag){
    const tags = document.getElementById("tags");

    if(tags.value.trim() === ""){
        tags.value = tag;
    } else if(!tags.value.includes(tag)){
        tags.value += ", " + tag;
    }
}

document.getElementById("imageUpload").addEventListener("change", function(event){

    const file = event.target.files[0];

    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){
        const preview = document.getElementById("preview");
        preview.src = e.target.result;
        preview.style.display = "block";
    };

    reader.readAsDataURL(file);
});

function saveEntry(){

    const entries = getEntries();

    const editingId = document.getElementById("editingId").value;

    const entry = {
        id: editingId || Date.now().toString(),
        category: document.getElementById("category").value,
        title: document.getElementById("title").value,
        location: document.getElementById("location").value,
        tags: document.getElementById("tags").value,
        content: document.getElementById("content").value,
        image: document.getElementById("preview").src || "",
        updated: new Date().toLocaleString()
    };

    const existingIndex = entries.findIndex(e => e.id === entry.id);

    if(existingIndex >= 0){
        entries[existingIndex] = entry;
    } else {
        entries.push(entry);
    }

    saveEntries(entries);

    document.getElementById("status").innerText = "Saved ✓";

    clearForm();

    renderEntries();
}

function clearForm(){
    document.getElementById("editingId").value = "";
    document.getElementById("category").value = "NPCs";
    document.getElementById("title").value = "";
    document.getElementById("location").value = "";
    document.getElementById("tags").value = "";
    document.getElementById("content").value = "";

    const preview = document.getElementById("preview");
    preview.src = "";
    preview.style.display = "none";
}

function editEntry(id){

    const entries = getEntries();

    const entry = entries.find(e => e.id === id);

    if(!entry) return;

    document.getElementById("editingId").value = entry.id;
    document.getElementById("category").value = entry.category;
    document.getElementById("title").value = entry.title;
    document.getElementById("location").value = entry.location;
    document.getElementById("tags").value = entry.tags;
    document.getElementById("content").value = entry.content;

    const preview = document.getElementById("preview");

    if(entry.image){
        preview.src = entry.image;
        preview.style.display = "block";
    } else {
        preview.style.display = "none";
    }

    window.scrollTo({top:0, behavior:'smooth'});
}

function renderEntries(){

    const container = document.getElementById("sidebarEntries");

    container.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();

    let entries = getEntries();

    if(currentFilter !== "All"){
        entries = entries.filter(e => e.category === currentFilter);
    }

    entries = entries.filter(e => {
        return (
            e.title.toLowerCase().includes(search) ||
            e.tags.toLowerCase().includes(search) ||
            e.content.toLowerCase().includes(search)
        );
    });

    const grouped = {};

    entries.forEach(entry => {

        if(!grouped[entry.category]){
            grouped[entry.category] = [];
        }

        grouped[entry.category].push(entry);

    });

    for(const category in grouped){

        const section = document.createElement("div");
        section.className = "section";

        const header = document.createElement("h3");
        header.innerText = category;

        const content = document.createElement("div");
        content.className = "section-content";

        header.onclick = () => {
            content.style.display =
                content.style.display === "none" ? "block" : "none";
        };

        grouped[category].forEach(entry => {

            const div = document.createElement("div");
            div.className = "entry-link";

            div.innerHTML = `
                <div class="entry-title">${entry.title}</div>
                <div class="small">${entry.location || ""}</div>
                <div class="small">${entry.updated}</div>
            `;

            div.onclick = () => editEntry(entry.id);

            content.appendChild(div);

        });

        section.appendChild(header);
        section.appendChild(content);

        container.appendChild(section);

    }

}

renderEntries();
</script>

</body>
</html>
